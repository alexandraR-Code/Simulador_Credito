<!DOCTYPE html>
<html lang="es">
<header class="header">

    <img src="https://i.ytimg.com/vi/XsZTLKrsnko/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLB6zkZzsKQn2I1prOXecCp-Lp25ow" 
         alt="Banco" 
         class="logo">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>

    <!-- Tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="simulador.css">

    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>
<body>

    <main class="container">

        <header class="header">
            <h1>Simulador de Crédito</h1>
            <p>Evalúa tu capacidad de pago en segundos</p>
        </header>

        <!-- CARD 1 -->
        <section class="card">
            <h2>Datos financieros</h2>

            <label for="txtIngresos">Ingresos</label>
            <input type="text" id="txtIngresos" placeholder="Ej: 1000">

            <label for="txtEgresos">Egresos</label>
            <input type="text" id="txtEgresos" placeholder="Ej: 500">

            <div class="result-box">
                <p>Disponible <span id="spnDisponible"></span></p>
                <p>Capacidad de pago <span id="spnCapacidadPago"></span></p>
            </div>
        </section>

        <!-- CARD 2 -->
        <section class="card">
            <h2>Solicitud de crédito</h2>

            <label for="txtMonto">Monto</label>
            <input type="text" id="txtMonto" placeholder="Ej: 2000">

            <label for="txtPlazo">Plazo (años)</label>
            <input type="text" id="txtPlazo" placeholder="Ej: 2">

            <label for="txtTasaInteres">Tasa (%)</label>
            <input type="text" id="txtTasaInteres" placeholder="Ej: 15">

            <div class="result-box">
                <p>Interés <span id="spnInteresPagar"></span></p>
                <p>Total <span id="spnTotalPrestamo"></span></p>
                <p>Cuota mensual <span id="spnCuotaMensual"></span></p>
                <p class="estado">Estado <span id="spnEstadoCredito">ANALIZANDO...</span></p>
            </div>
        </section>

        <!-- BOTONES -->
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>

    </main>

</body>
</html>
