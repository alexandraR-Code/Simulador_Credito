<!DOCTYPE html>
<html lang="es">
<header class="header">

    <img src="https://i.ytimg.com/vi/XsZTLKrsnko/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLB6zkZzsKQn2I1prOXecCp-Lp25ow" 
         alt="Banco" 
         class="logo">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>

    <!-- Tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="simulador.css">

    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>
<body>

    <main class="container">

        <header class="header">
            <h1>Simulador de Crédito</h1>
            <p>Evalúa tu capacidad de pago en segundos</p>
        </header>

        <!-- CARD 1 -->
        <section class="card">
            <h2>Datos financieros</h2>

            <label for="txtIngresos">Ingresos</label>
            <input type="text" id="txtIngresos" onblur="validarCampo('txtIngresos','errorIngresos')">
            <span id="errorIngresos" class="error"></span>

            <label for="txtArriendo">Arriendo</label>
            <input type="text" id="txtArriendos" onblur="validarCampo('txtArriendo','errorArriendo')">
            <span id="errorArriendo" class="error"></span>

            <label for="txtAlimentacion">Alimentación</label>
            <input type="text" id="txtAlimentacion" onblur="validarCampo('txtAlimentacion','errorAlimentacion')">
            <span id="errorAlimentacion" class="error"></span>
            
            <label for="txtVarios">Varios</label>
            <input type="text" id="txtVarios" onblur="validarCampo('txtVarios','errorVarios')">
            <span id="errorVarios" class="error"></span>

            <p>Total gastos: <span id="spnTotalGastos"></span></p>

            <div class="result-box">
                <p>Disponible <span id="spnDisponible"></span></p>
                <p>Capacidad de pago <span id="spnCapacidadPago"></span></p>
            </div>
        </section>

        <!-- CARD 2 -->
        <section class="card">
            <h2>Solicitud de crédito</h2>

            <label for="txtMonto">Monto</label>
            <input type="text" id="txtMonto" onblur="validarCampo('txtMonto','errorMonto')">
            <span id="errorMonto" class="error"></span>

            <label for="txtPlazo">Plazo (años)</label>
            <input type="text" id="txtPlazo" onblur="validarCampo('txtPlazo','errorPlazo')">
            <span id="errorPlazo" class="error"></span>

            <label for="txtTasaInteres">Tasa (%)</label>
            <input type="text" id="txtTasaInteres" onblur="validarCampo('txtTasaInteres','errorTasa')">
            <span id="errorTasa" class="error"></span>



            <div class="result-box">
                <p>Interés <span id="spnInteresPagar"></span></p>
                <p>Total <span id="spnTotalPrestamo"></span></p>
                <p>Cuota mensual <span id="spnCuotaMensual"></span></p>
                <p class="estado">Estado <span id="spnEstadoCredito">ANALIZANDO...</span></p>
            </div>
        </section>

        <!-- BOTONES -->
        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()" disabled>Calcular</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>

    </main>

</body>
</html>
